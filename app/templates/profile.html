{% extends "base.html" %}

{% block content %}
<h1>Profile</h1>
<hr>

{% if user %}
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">{{ user['username'] }}</h5>
            <p><strong>Email:</strong> {{ user['email'] }}</p>
            <!-- VULN: Stored XSS - bio rendered with |safe filter -->
            <p><strong>Bio:</strong> {{ user['bio'] | safe }}</p>
        </div>
    </div>

    <h3>Update Bio</h3>
    <!-- VULN: No CSRF token in form -->
    <form method="POST" action="/profile">
        <div class="mb-3">
            <label for="bio" class="form-label">Bio</label>
            <textarea class="form-control" id="bio" name="bio" rows="3">{{ user['bio'] }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update Bio</button>
    </form>
{% else %}
    <div class="alert alert-warning">
        User not found. Please <a href="/login">login</a> again.
    </div>
{% endif %}
{% endblock %}
